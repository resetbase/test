<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サブスクサービスLP</title>
  <style>
    /* ------------------------------
       ベースリセット
    ------------------------------ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      height: 100%;
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background-color: #000;
      color: #fff;
    }

    /* ------------------------------
       レイアウトの骨格 (PC表示時)
    ------------------------------ */
    .layout-wrapper {
      display: grid;
      /* 左(1倍) : 中央(スマホ幅 400px) : 右(1倍) */
      grid-template-columns: 1fr 400px 1fr;
      height: 100vh;
      overflow: hidden; /* 画面全体のスクロールを禁止 */
    }

    /* ------------------------------
       左側エリア（背景画像・固定）
    ------------------------------ */
    .left-panel {
      /* ダミーの背景色・画像 */
      background-color: #333;
      background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://via.placeholder.com/800x1200/333/666?text=Left+Background');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end; /* テキストを下部に配置 */
      padding: 50px;
    }
    .left-panel h1 {
      font-size: 3.5rem;
      line-height: 1.1;
      letter-spacing: 0.05em;
    }

    /* ------------------------------
       中央エリア（スマホ画面・スクロール）
    ------------------------------ */
    .center-mobile-panel {
      background-color: #1a1a1a;
      overflow-y: auto; /* ここだけ縦スクロール可能にする */
      position: relative;
      /* 左右に影をつけてスマホっぽさを強調 */
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
      
      /* スクロールバーを非表示にする場合（お好みで外してください） */
      scrollbar-width: none; /* Firefox */
    }
    .center-mobile-panel::-webkit-scrollbar {
      display: none; /* Chrome, Safari */
    }

    /* スマホ画面内のコンテンツ領域 */
    .mobile-content {
      /* スクロール確認のため意図的に高くしています */
      min-height: 200vh; 
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .mobile-content header {
      font-weight: bold;
      text-align: center;
      letter-spacing: 0.1em;
    }

    .dummy-image {
      width: 100%;
      height: 250px;
      background-color: #444;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .about-section h2 {
      font-size: 1.2rem;
      margin-bottom: 15px;
      text-align: center;
      letter-spacing: 0.1em;
    }
    .about-section p {
      font-size: 0.9rem;
      line-height: 1.8;
      color: #ccc;
    }

    /* ------------------------------
       右側エリア（ナビゲーション・固定）
    ------------------------------ */
    .right-panel {
      background-color: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 50px;
    }
    
    .nav-menu {
      list-style: none;
      margin-bottom: 60px;
    }
    .nav-menu li {
      margin-bottom: 25px;
    }
    .nav-menu a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      letter-spacing: 0.1em;
      transition: color 0.3s;
    }
    .nav-menu a:hover {
      color: #aaa;
    }

    .social-links {
      display: flex;
      gap: 15px;
    }
    .social-icon {
      width: 24px;
      height: 24px;
      background-color: #fff;
      border-radius: 50%;
      display: inline-block;
    }

    /* ------------------------------
       レスポンシブ (実際のスマホで見た時)
    ------------------------------ */
    @media (max-width: 1024px) {
      .layout-wrapper {
        /* カラム分割をやめて中央エリアのみを全画面にする */
        grid-template-columns: 1fr; 
      }
      .left-panel, .right-panel {
        display: none; /* スマホでは左右を隠す */
      }
      .center-mobile-panel {
        box-shadow: none; /* 影を消す */
      }
    }
  </style>
</head>
<body>

  <div class="layout-wrapper">
    
    <aside class="left-panel">
      <h1>SERVICE.<br>CONNECT.<br>INSPIRE.</h1>
    </aside>

    <main class="center-mobile-panel">
      <div class="mobile-content">
        <header>SUBSCRIPTION MOBI</header>
        
        <div class="dummy-image">
          [ メインビジュアル ]
        </div>

        <section class="about-section">
          <h2>A B O U T</h2>
          <p>
            ここにサブスクリプションサービスの概要が入ります。このエリアを下にスクロールすることで、サービスの詳細や料金プランなどを確認できます。
          </p>
          <br>
          <p>
            左右のパネルはスクロールしても追従せず固定されたままになります。
          </p>
        </section>

        <div style="height: 600px; background: linear-gradient(to bottom, #222, #000); display: flex; align-items: center; justify-content: center;">
          [ コンテンツエリア 1 ]
        </div>
        <div style="height: 600px; background: linear-gradient(to bottom, #000, #222); display: flex; align-items: center; justify-content: center;">
          [ コンテンツエリア 2 ]
        </div>

      </div>
    </main>

    <nav class="right-panel">
      <ul class="nav-menu">
        <li><a href="#">TOP</a></li>
        <li><a href="#">ABOUT</a></li>
        <li><a href="#">PLANS</a></li>
        <li><a href="#">FEATURES</a></li>
        <li><a href="#">FAQ</a></li>
      </ul>
      <div class="social-links">
        <span class="social-icon"></span>
        <span class="social-icon"></span>
        <span class="social-icon"></span>
      </div>
    </nav>

  </div>

</body>
</html>
