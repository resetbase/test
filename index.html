<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>採用サイト 画像再現版</title>
<style>
  /* 基本リセット */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    color: #fff;
    height: 100vh;
    overflow: hidden; /* スクロールバーを隠して全画面固定に */
    /* 背景画像と右側のグリーングラデーションを合成（画像は仮の風景画像です） */
    background: linear-gradient(to right, rgba(43, 89, 69, 0) 40%, rgba(43, 89, 69, 1) 80%), 
                url('https://images.unsplash.com/photo-1542259009477-d625272157b7?q=80&w=2000&auto=format&fit=crop') no-repeat center center/cover;
  }

  /* 左上のロゴエリア */
  .logo-area {
    position: absolute; top: 0; left: 0; z-index: 10;
    background: #fff; color: #000;
    padding: 10px 20px 20px;
    border-bottom-right-radius: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .logo-area-top { 
    background: #1a4a38; color: #fff; font-size: 0.8rem; font-weight: bold;
    padding: 8px 20px; margin: -10px -20px 15px; 
  }
  .logo-img-placeholder { font-weight: 900; color: #1a4a38; font-size: 1.5rem; letter-spacing: 0.05em; }

  /* 全体レイアウト：3カラム（左・中央スマホ・右） */
  .container {
    display: flex; justify-content: space-between; align-items: center;
    height: 100%; padding: 0 4%;
  }

  /* === 左カラム === */
  .left-col { flex: 1; padding-top: 50px; }
  
  .catchphrase { font-size: 5rem; font-family: serif; line-height: 1.1; margin-bottom: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
  .catchphrase span { font-style: italic; color: #e6c875; }
  .sub-catch { font-size: 1.1rem; font-weight: bold; margin-bottom: 50px; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

  .btn-group { display: flex; flex-direction: column; gap: 15px; width: 320px; }
  .btn {
    background: rgba(212, 175, 55, 0.85); /* ゴールド系半透明 */
    color: #111; text-align: center; font-weight: bold; font-size: 0.9rem;
    padding: 18px 20px; border-radius: 50px; text-decoration: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.3s;
    display: flex; justify-content: space-between; align-items: center;
  }
  .btn::after { content: '↗'; font-size: 1.2rem; }
  .btn:hover { background: rgba(212, 175, 55, 1); transform: translateY(-2px); }

  /* === 中央カラム（スマホ風コンテナ） === */
  .center-col {
    width: 360px; height: 85vh;
    border: 3px solid #d4af37; /* 金色の枠 */
    border-radius: 40px; background: #1a4a38;
    overflow: hidden; position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
  }
  
  /* スマホ内の上部（画像エリア） */
  .phone-top {
    height: 55%; background: #fff;
    padding: 20px 10px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
    display: flex; gap: 10px; overflow: hidden; justify-content: center;
  }
  .phone-img {
    flex: 0 0 80%; border-radius: 20px;
    background: url('https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=600&auto=format&fit=crop') center/cover;
  }
  .phone-img-side { flex: 0 0 15%; border-radius: 20px; background: #ccc; }

  /* スマホ内の下部（テキストエリア） */
  .phone-bottom { padding: 40px 30px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .phone-bottom h2 { font-size: 2.5rem; line-height: 1.2; margin-bottom: 20px; font-weight: bold; }
  .phone-bottom p { font-size: 0.65rem; color: #d4af37; letter-spacing: 0.15em; font-weight: bold; }

  /* === 右カラム（メニュー） === */
  .right-col { flex: 1; display: flex; flex-direction: column; align-items: flex-end; padding-right: 20px; }
  .menu-item { margin-bottom: 40px; text-align: left; width: 260px; cursor: pointer; transition: 0.3s; }
  .menu-item:hover { opacity: 0.7; }
  .menu-en { font-size: 2rem; color: #d4af37; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; font-family: serif; }
  .menu-en::after { content: '→'; font-size: 1.2rem; background: #d4af37; color: #1a4a38; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
  .menu-ja { font-size: 0.85rem; font-weight: bold; letter-spacing: 0.05em; }
</style>
</head>
<body>

<div class="logo-area">
  <div class="logo-area-top">Recruiting 採用サイト</div>
  <div class="logo-img-placeholder">JUNGLIA<br>OKINAWA</div>
</div>

<div class="container">
  
  <div class="left-col">
    <h1 class="catchphrase"><span>Creating</span> from<br>Okinawa.</h1>
    <p class="sub-catch">沖縄から日本の"未来"をつくる。</p>
    <div class="btn-group">
      <a href="#" class="btn">新卒/キャリア採用エントリー</a>
      <a href="#" class="btn">ナビゲーター採用 エントリー</a>
    </div>
  </div>

  <div class="center-col">
    <div class="phone-top">
      <div class="phone-img-side"></div>
      <div class="phone-img"></div>
      <div class="phone-img-side"></div>
    </div>
    <div class="phone-bottom">
      <h2>沖縄から<br>日本の"未来"<br>をつくる。</h2>
      <p>JAPAN ENTERTAINMENT RECRUITING SITE</p>
    </div>
  </div>

  <div class="right-col">
    <div class="menu-item">
      <div class="menu-en">Top</div>
      <div class="menu-ja">採用ページトップ</div>
    </div>
    <div class="menu-item">
      <div class="menu-en">About us</div>
      <div class="menu-ja">ジャパンエンターテイメントについて</div>
    </div>
  </div>

</div>

</body>
</html>
